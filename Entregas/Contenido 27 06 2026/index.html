<script>
function dlFoto(url, nombre) {
  fetch(url)
    .then(function(r){ return r.blob(); })
    .then(function(blob){
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = nombre;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    })
    .catch(function(){ window.open(url, '_blank'); });
}
function dlTodo() {
  var btns = document.querySelectorAll('.entrega-item img');
  var btn = document.querySelector('.btn-all');
  btn.textContent = 'Descargando...';
  btns.forEach(function(img, i){
    setTimeout(function(){
      var src = img.src.replace('/w_800,q_auto/', '/');
      var nombre = src.split('/').pop();
      dlFoto(src, nombre);
    }, i * 600);
  });
  setTimeout(function(){ btn.textContent = '↓ Descargar todas'; }, btns.length * 600 + 1000);
}</script>
